<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
    <ion-back-button defaultHref="/home" text="Home"></ion-back-button>
    </ion-buttons>
    
    <ion-title>Settings Page</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-card>
    <ion-card-header>
      <ion-card-title>Game Settings</ion-card-title>
    </ion-card-header>

    <ion-card-content>
      <ion-item>
        <ion-label>Number Guess Difficulty</ion-label>
        <ion-select [(ngModel)]="guessDifficulty">
          <ion-select-option value="easy">Easy (1-10)</ion-select-option>
          <ion-select-option value="medium">Medium (1-50)</ion-select-option>
          <ion-select-option value="hard">Hard (1-100)</ion-select-option>
        </ion-select>
      </ion-item>

      <ion-button expand="block" (click)="saveSettings()">
        Save Settings
      </ion-button>
    </ion-card-content>
  </ion-card>
</ion-content>
